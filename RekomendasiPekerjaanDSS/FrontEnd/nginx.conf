# Frontend nginx config
# - Serve SPA (history fallback ke index.html)
# - Reverse proxy /api/* ke service "backend" di docker network背中

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: semua route yang tidak punya ekstensi diarahkan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache ringan untuk asset dengan hash (dist/assets/*)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy ke backend ASP.NET Core
    # - nama service "backend" sesuai docker-compose
    # - port 8080 adalah yang dipakai di Dockerfile backend
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Optional: izinkan Swagger UI jika ada
    location /swagger {
        proxy_pass http://backend:8080;
    }

    # Gzip untuk file teks
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}