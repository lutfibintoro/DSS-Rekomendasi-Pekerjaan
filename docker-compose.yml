# ============================================================
# docker-compose.yml — DSS Rekomendasi Pekerjaan
# Cara pakai:
#   docker compose up -d --build
#   docker compose down
# ============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL — database utama
  # -----------------------------------------------------------
  db:
    image: postgres:17-alpine
    container_name: dss-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dss_db}
      POSTGRES_USER:     ${POSTGRES_USER:-dss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dss_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dss_user} -d ${POSTGRES_DB:-dss_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dss-net

  # -----------------------------------------------------------
  # Backend — ASP.NET Core 10 Minimal API
  # -----------------------------------------------------------
  backend:
    build:
      context: ./RekomendasiPekerjaanDSS
      dockerfile: BackEnd/Dockerfile
    container_name: dss-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT:      ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS:             http://+:8080
      ConnectionStrings__Default:  Host=db;Port=5432;Database=${POSTGRES_DB:-dss_db};Username=${POSTGRES_USER:-dss_user};Password=${POSTGRES_PASSWORD:-dss_pass}
      # Optional: port untuk akses langsung (untuk debugging di host)
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - dss-net

  # -----------------------------------------------------------
  # Frontend — React/Vite served by Nginx
  # Reverse proxy /api -> backend otomatis lewat nginx.conf
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./RekomendasiPekerjaanDSS/FrontEnd
      dockerfile: Dockerfile
    container_name: dss-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - dss-net

# ============================================================
# Volumes & Networks
# ============================================================
volumes:
  db-data:
    driver: local

networks:
  dss-net:
    driver: bridge